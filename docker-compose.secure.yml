version: '3.8'

# ============================================================================
# PRODUCTION-READY SECURE DEPLOYMENT
# See DEPLOYMENT_VERIFICATION_CHECKLIST.md for verification procedures
# ============================================================================

services:
  # ============================================================================
  # PostgreSQL Database - INTERNAL ONLY
  # ============================================================================
  postgres:
    image: postgres:15-alpine
    container_name: risk-monitoring-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-alert_db}
      POSTGRES_INITDB_ARGS: >-
        -c log_connections=on
        -c log_disconnections=on
        -c log_statement=all
        -c log_min_duration_statement=0
        -c max_connections=100
        -c shared_buffers=256MB
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================================
  # RabbitMQ Message Queue - INTERNAL ONLY
  # ============================================================================
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: risk-monitoring-mq
    environment:
      RABBITMQ_DEFAULT_USER: ${MQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${MQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================================
  # Redis Cache - INTERNAL ONLY
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: risk-monitoring-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================================
  # Alert Service - PUBLIC API
  # ============================================================================
  alert-service:
    build:
      context: ./backend
      dockerfile: alert-service/Dockerfile
      args:
        JAVA_OPTS: "-XX:+UseG1GC -XX:MaxGCPauseMillis=200"
    image: alert-service:latest
    container_name: risk-monitoring-alert-service
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_APPLICATION_NAME: alert-service

      # Database
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-alert_db}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      
      # RabbitMQ
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${MQ_USER:-guest}
      SPRING_RABBITMQ_PASSWORD: ${MQ_PASSWORD}
      
      # Redis
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD}

      # Security
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: 3600000
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      
      # HTTPS/SSL
      SERVER_SSL_ENABLED: "true"
      SERVER_SSL_KEY_STORE: /etc/ssl/keystore.p12
      SERVER_SSL_KEY_STORE_PASSWORD: ${KEYSTORE_PASSWORD}
      SERVER_SSL_KEY_STORE_TYPE: PKCS12
      SERVER_SSL_KEY_ALIAS: tomcat

      # Rate limiting
      RATE_LIMIT_ENABLED: "true"
      RATE_LIMIT_PER_MINUTE: 60

      LOGGING_LEVEL_ROOT: INFO

    volumes:
      - ${SSL_KEYSTORE_PATH}:/etc/ssl/keystore.p12:ro
      - alert-service-logs:/var/log/alert-service

    ports:
      - "443:8443"
      
    networks:
      - frontend
      - backend

    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "https://localhost:8443/health", "-k"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1024M
        reservations:
          cpus: '0.5'
          memory: 512M

    user: "1000:1000"

  # ============================================================================
  # Producer Service
  # ============================================================================
  producer-service:
    build:
      context: ./backend
      dockerfile: producer-service/Dockerfile
      args:
        JAVA_OPTS: "-XX:+UseG1GC -XX:MaxGCPauseMillis=200"
    image: producer-service:latest
    container_name: risk-monitoring-producer-service
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_APPLICATION_NAME: producer-service
      
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-alert_db}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${MQ_USER:-guest}
      SPRING_RABBITMQ_PASSWORD: ${MQ_PASSWORD}
      
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD}

      LOGGING_LEVEL_ROOT: INFO

    volumes:
      - producer-service-logs:/var/log/producer-service

    networks:
      - backend

    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1024M
        reservations:
          cpus: '0.5'
          memory: 512M

    user: "1000:1000"

  # ============================================================================
  # Risk Engine
  # ============================================================================
  risk-engine:
    build:
      context: ./backend
      dockerfile: risk-engine/Dockerfile
      args:
        JAVA_OPTS: "-XX:+UseG1GC -XX:MaxGCPauseMillis=200"
    image: risk-engine:latest
    container_name: risk-monitoring-risk-engine
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_APPLICATION_NAME: risk-engine
      
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-alert_db}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${MQ_USER:-guest}
      SPRING_RABBITMQ_PASSWORD: ${MQ_PASSWORD}
      
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD}

      LOGGING_LEVEL_ROOT: INFO

    volumes:
      - risk-engine-logs:/var/log/risk-engine

    networks:
      - backend

    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2048M
        reservations:
          cpus: '1'
          memory: 1024M

    user: "1000:1000"

networks:
  frontend:
    driver: bridge
    
  backend:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.enable_icc: "true"

volumes:
  postgres_data:
  rabbitmq_data:
  redis_data:
  alert-service-logs:
  producer-service-logs:
  risk-engine-logs:
