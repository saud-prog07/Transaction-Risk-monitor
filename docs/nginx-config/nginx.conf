# Nginx Production Configuration with SSL/TLS and Security
# Save as: nginx.conf
# Mount in docker-compose: ./nginx.conf:/etc/nginx/nginx.conf:ro

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

# Rate limiting
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
limit_req_status 429;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Performance optimization
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 1M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss;
    gzip_disable "msie6";

    # Hide nginx version
    server_tokens off;

    # Map to determine if SSL is enabled
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # ===== HTTP to HTTPS Redirect =====
    server {
        listen 80;
        server_name _;
        
        # Allow letsencrypt for certificate renewal
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        
        # Redirect all HTTP to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ===== HTTPS Server Block =====
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name api.yourdomain.com;

        # ===== SSL/TLS Configuration =====
        ssl_certificate /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # ===== Security Headers =====
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" always;

        # ===== Logging =====
        access_log /var/log/nginx/api_access.log main;
        error_log /var/log/nginx/api_error.log warn;

        # ===== Backend Proxy =====
        upstream alert_service {
            server alert-service:8443 max_fails=3 fail_timeout=30s;
            keepalive 32;
        }

        # ===== WebSocket Configuration =====
        location /ws {
            proxy_pass https://alert_service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
        }

        # ===== Rate Limited API Endpoints =====
        location /api/auth/login {
            limit_req zone=auth_limit burst=3 nodelay;
            proxy_pass https://alert_service;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/auth/register {
            limit_req zone=auth_limit burst=2 nodelay;
            proxy_pass https://alert_service;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ===== Public API Endpoints =====
        location /api/alerts {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass https://alert_service;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ===== Health Check Endpoint =====
        location /health {
            proxy_pass https://alert_service;
            access_log off;
        }

        # ===== Metrics Endpoint (Restricted) =====
        location /metrics {
            # Only allow from internal network
            allow 172.17.0.0/16;   # Docker network
            allow 10.0.0.0/8;      # Private network
            deny all;
            
            proxy_pass https://alert_service;
            proxy_set_header Host $host;
        }

        # ===== 404 Handler =====
        error_page 404 /404.json;
        location = /404.json {
            internal;
            return 404 '{"error": "Not Found"}';
            add_header Content-Type application/json;
        }

        # ===== 502 Bad Gateway Handler =====
        error_page 502 /502.json;
        location = /502.json {
            internal;
            return 502 '{"error": "Service Unavailable"}';
            add_header Content-Type application/json;
        }

        # ===== Security Headers =====
        # Block access to sensitive files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~ ~$ {
            deny all;
            access_log off;
            log_not_found off;
        }
    }

    # ===== Admin Server (Separate Interface) =====
    server {
        listen 9443 ssl;
        server_name admin.yourdomain.com;

        ssl_certificate /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # Admin only - restricted access
        allow 203.0.113.0/24;      # Your office IP
        deny all;

        location / {
            proxy_pass https://alert_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
