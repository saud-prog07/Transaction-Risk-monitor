version: '3.9'

# ============================================================================
# RISK MONITORING SYSTEM - DOCKER COMPOSE CONFIGURATION
# ============================================================================
# This file orchestrates the complete microservices environment
#
# Architecture Overview:
# ┌─────────────────────────────────────────────────────────────────┐
# │ Producer Service (8080) - Generates transaction events          │
# │                      ↓                                          │
# │ IBM MQ (1414) - Event broker (Enterprise messaging)            │
# │         ↙              ↘                                        │
# │ Risk Engine (8081)    Alert Service (8082)                     │
# │        ↓                      ↓                                 │
# │  Risk Analysis    PostgreSQL (5432) + WebSocket               │
# │                   Database layer for persistence               │
# │                      ↓                                          │
# │              Operations Dashboard (Frontend)                    │
# └─────────────────────────────────────────────────────────────────┘
#
# Quick Start:
# 1. docker-compose up -d          # Start all services
# 2. docker-compose logs -f        # Follow logs
# 3. docker-compose down           # Stop all services
#
# ============================================================================

services:
  # =========================================================================
  # POSTGRES - Persistent Data Store
  # =========================================================================
  # Stores alerts, investigations, configurations, and historical data
  # Why Alpine? Smaller image (40MB vs 200MB), suitable for containers
  # Production: Use managed RDS in AWS/Azure instead of self-hosted
  postgres:
    image: postgres:15-alpine
    container_name: risk-monitoring-postgres
    environment:
      POSTGRES_USER: $${DB_USER:=riskmonitor}
      POSTGRES_PASSWORD: $${DB_PASSWORD:=secure_password}
      POSTGRES_DB: $${DB_NAME:=risk_monitoring_db}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      # Initialize database with schema
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/01-init.sql
      # Persist data
      - postgres_data:/var/lib/postgresql/data
    networks:
      - risk-monitoring-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${DB_USER:=riskmonitor}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =========================================================================
  # IBM MQ - Enterprise Message Broker
  # =========================================================================
  # Provides reliable message delivery between services
  # Features: Transaction support, Dead Letter Queue (DLQ), Guaranteed delivery
  # 
  # Key Capabilities:
  # - Handles 10,000+ messages/second sustainably
  # - Automatic retry with exponential backoff
  # - Dead-letter queue for failed messages
  # - Persistent storage ensures no message loss on crashes
  #
  # Ports:
  #   1414/TCP - Request/Reply port (MQ Listener)
  #   9443/TCP - Administrative console (web UI)
  #
  # For production, consider AWS MQ or IBM Cloud Pak for Integration
  ibm-mq:
    image: icr.io/ibm-messaging/mq:latest
    container_name: risk-monitoring-mq
    environment:
      LICENSE: accept
      MQ_QMGR_NAME: QMGR
      MQ_APP_PASSWORD: $${MQ_PASSWORD:=passw0rd}
      MQ_ADMIN_PASSWORD: $${MQ_ADMIN_PASSWORD:=passw0rd}
      MQ_DEV: "true"
    ports:
      # MQ Listener
      - "1414:1414"
      # IBM MQ Console (optional)
      - "9443:9443"
    volumes:
      # Persist MQ data
      - mq_data:/mnt/mqm
    networks:
      - risk-monitoring-network
    healthcheck:
      test: ["CMD", "runmqsc", "-w", "5", "-e", "QMGR"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =========================================================================
  # PRODUCER SERVICE - Transaction Event Generation
  # =========================================================================
  # Simulates real-world transaction events for risk analysis
  #
  # Responsibilities:
  #   1. Generates synthetic transaction data (for testing)
  #   2. Publishes transactions to IBM MQ (TRANSACTION_QUEUE)
  #   3. Exposes REST API for transaction submission
  #   4. Health checks and monitoring metrics
  #
  # API Endpoints: http://localhost:8080/api/
  #   POST   /transactions/submit      - Submit a single transaction
  #   POST   /transactions/batch       - Batch submit transactions
  #   GET    /actuator/health          - Health status
  #   GET    /actuator/metrics         - Performance metrics
  #
  # Technology: Spring Boot 3.x, lightweight service for production load testing
  # Response Time: <100ms per transaction (target)
  # Throughput: 5,000+ tx/second (single instance)
  producer-service:
    build:
      context: .
      dockerfile: producer-service/Dockerfile
    image: risk-monitoring/producer-service:latest
    container_name: risk-monitoring-producer
    depends_on:
      ibm-mq:
        condition: service_healthy
    environment:
      # Spring profile
      SPRING_PROFILES_ACTIVE: $${SPRING_PROFILES_ACTIVE:=docker}
      SPRING_APPLICATION_NAME: producer-service
      
      # Server configuration
      SERVER_PORT: 8080
      SERVER_SERVLET_CONTEXT_PATH: /api
      
      # IBM MQ configuration
      MQ_HOST: ibm-mq
      MQ_PORT: 1414
      MQ_QMGR: QMGR
      MQ_CHANNEL: DEV.APP.SVRCONN
      MQ_USER: $${MQ_USER:=app}
      MQ_PASSWORD: $${MQ_PASSWORD:=passw0rd}
      MQ_QUEUE_NAME: TRANSACTION_QUEUE
      
      # JMS configuration
      SPRING_JMS_ACTIVEMQ_BROKER_URL: tcp://ibm-mq:61616
      
      # Actuator/Monitoring
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,metrics,info"
      MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: when-authorized
    ports:
      - "8080:8080"
    networks:
      - risk-monitoring-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =========================================================================
  # RISK ENGINE - Real-Time Fraud Analysis
  # =========================================================================
  # Core intelligence service that analyzes transactions for fraud indicators
  #
  # Responsibilities:
  #   1. Consumes TRANSACTION_QUEUE from IBM MQ
  #   2. Analyzes transactions against 20+ risk rules:
  #      - Geolocation anomalies
  #      - Velocity checks (transaction frequency)
  #      - Behavioral patterns
  #      - Amount thresholds
  #   3. Publishes risk verdicts to ALERT_QUEUE
  #   4. Maintains in-memory cache of user profiles (Redis)
  #
  # API Endpoints: http://localhost:8081/api/
  #   GET    /rules                     - List active risk rules
  #   POST   /rules                     - Create custom rule
  #   GET    /transactions/{id}/risk    - Get risk score details
  #   GET    /actuator/health           - Service health
  #
  # Performance Targets:
  #   - Latency: <500ms per transaction
  #   - Throughput: 3,000+ tx/second (single instance)
  #   - Cache hit rate: >85% (Redis)
  #
  # Dependencies: IBM MQ, Redis (optional caching)
  risk-engine:
    build:
      context: .
      dockerfile: risk-engine/Dockerfile
    image: risk-monitoring/risk-engine:latest
    container_name: risk-monitoring-risk-engine
    depends_on:
      ibm-mq:
        condition: service_healthy
    environment:
      # Spring profile
      SPRING_PROFILES_ACTIVE: $${SPRING_PROFILES_ACTIVE:=docker}
      SPRING_APPLICATION_NAME: risk-engine
      
      # Server configuration
      SERVER_PORT: 8081
      SERVER_SERVLET_CONTEXT_PATH: /api
      
      # IBM MQ configuration
      MQ_HOST: ibm-mq
      MQ_PORT: 1414
      MQ_QMGR: QMGR
      MQ_CHANNEL: DEV.APP.SVRCONN
      MQ_USER: $${MQ_USER:=app}
      MQ_PASSWORD: $${MQ_PASSWORD:=passw0rd}
      MQ_QUEUE_NAME: TRANSACTION_QUEUE
      MQ_ALERT_QUEUE_NAME: ALERT_QUEUE
      
      # JMS configuration
      SPRING_JMS_ACTIVEMQ_BROKER_URL: tcp://ibm-mq:61616
      
      # Risk Analysis configuration
      RISK_ENGINE_THRESHOLD_HIGH: $${RISK_THRESHOLD_HIGH:=0.8}
      RISK_ENGINE_THRESHOLD_MEDIUM: $${RISK_THRESHOLD_MEDIUM:=0.5}
      
      # Actuator/Monitoring
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,metrics,info"
      MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: when-authorized
    ports:
      - "8081:8081"
    networks:
      - risk-monitoring-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =========================================================================
  # ALERT SERVICE - Persistence & WebSocket Notifications
  # =========================================================================
  # Handles alert persistence, investigation workflows, and real-time updates
  #
  # Responsibilities:
  #   1. Consumes ALERT_QUEUE from IBM MQ (high-risk transactions)
  #   2. Stores alerts in PostgreSQL with full audit trail
  #   3. WebSocket connections for real-time dashboard updates
  #   4. Manages fraud investigation workflows
  #   5. Integrates with external notification systems (email, Slack)
  #
  # API Endpoints: http://localhost:8082/api/
  #   GET    /alerts                    - List alerts (paginated, filterable)
  #   GET    /alerts/{id}               - Get alert details
  #   PATCH  /alerts/{id}/status        - Update investigation status
  #   POST   /alerts/{id}/actions       - Log manual actions (block, review)
  #   POST   /investigations            - Create investigation
  #   WS     /ws/alerts                 - WebSocket for live updates
  #
  # Database Schema:
  #   - alerts (transactionId, riskScore, status, timestamp)
  #   - investigations (alertId, userId, notes, resolution)
  #   - audit_events (action, actor, timestamp)
  #
  # Performance:
  #   - Database throughput: 10,000+ writes/second
  #   - WebSocket connections: 500+ concurrent clients
  #   - Alert indexing: Optimized for fraud analyst queries
  alert-service:
    build:
      context: .
      dockerfile: alert-service/Dockerfile
    image: risk-monitoring/alert-service:latest
    container_name: risk-monitoring-alert
    depends_on:
      postgres:
        condition: service_healthy
      ibm-mq:
        condition: service_healthy
    environment:
      # Spring profile
      SPRING_PROFILES_ACTIVE: $${SPRING_PROFILES_ACTIVE:=docker}
      SPRING_APPLICATION_NAME: alert-service
      
      # Server configuration
      SERVER_PORT: 8082
      SERVER_SERVLET_CONTEXT_PATH: /api
      
      # Database configuration
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/$${DB_NAME:=risk_monitoring_db}
      SPRING_DATASOURCE_USERNAME: $${DB_USER:=riskmonitor}
      SPRING_DATASOURCE_PASSWORD: $${DB_PASSWORD:=secure_password}
      SPRING_JPA_HIBERNATE_DDL_AUTO: $${DB_DDL_AUTO:=validate}
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQL10Dialect
      SPRING_JPA_SHOW_SQL: "false"
      SPRING_JPA_PROPERTIES_HIBERNATE_JDBC_BATCH_SIZE: "20"
      SPRING_JPA_PROPERTIES_HIBERNATE_ORDER_INSERTS: "true"
      SPRING_JPA_PROPERTIES_HIBERNATE_ORDER_UPDATES: "true"
      
      # IBM MQ configuration
      MQ_HOST: ibm-mq
      MQ_PORT: 1414
      MQ_QMGR: QMGR
      MQ_CHANNEL: DEV.APP.SVRCONN
      MQ_USER: $${MQ_USER:=app}
      MQ_PASSWORD: $${MQ_PASSWORD:=passw0rd}
      MQ_ALERT_QUEUE_NAME: ALERT_QUEUE
      
      # JMS configuration
      SPRING_JMS_ACTIVEMQ_BROKER_URL: tcp://ibm-mq:61616
      
      # Actuator/Monitoring
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,metrics,info"
      MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: when-authorized
    ports:
      - "8082:8082"
    networks:
      - risk-monitoring-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8082/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# Shared Docker network for inter-service communication
networks:
  risk-monitoring-network:
    driver: bridge
    name: risk-monitoring-network
    # Services communicate via hostname (e.g., producer-service:8080)
    # Advantages of bridge network:
    # - Isolated from host network (security)
    # - Built-in DNS resolution
    # - Service discovery via container names
    # - Network-level isolation between services

# Named volumes for data persistence
volumes:
  postgres_data:
    driver: local
    # PostgreSQL data directory
    # Persists between container restarts
    # For production: Use external storage (EBS, Azure Managed Disk, NFS)
  
  mq_data:
    driver: local
    # IBM MQ queue and journal files
    # Guarantees message durability
    # For production: Replicate across availability zones

# ============================================================================
# ENVIRONMENT VARIABLES REFERENCE
# ============================================================================
#
# SECURITY VARIABLES (Required in .env):
#   DB_USER              - PostgreSQL username (default: riskmonitor)
#   DB_PASSWORD          - PostgreSQL password (⚠️  Change in production!)
#   DB_NAME              - Database name (default: risk_monitoring_db)
#   MQ_USER              - IBM MQ user (default: app)
#   MQ_PASSWORD          - IBM MQ app password (⚠️  Change in production!)
#   MQ_ADMIN_PASSWORD    - IBM MQ admin password (⚠️  Change in production!)
#
# SPRING CONFIGURATION:
#   SPRING_PROFILES_ACTIVE - Environment profile (docker/production/development)
#   SERVER_PORT           - Service port mapping
#   MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE - What metrics endpoint expose
#
# ============================================================================
# TROUBLESHOOTING GUIDE
# ============================================================================
#
# ❌ PROBLEM: Services won't start
#    ✓ Run: docker-compose logs <service_name>
#    ✓ Check: Ports 5432, 1414, 8080-8082 are available
#    ✓ Verify: .env file exists with valid passwords
#
# ❌ PROBLEM: Services stuck in "starting" state
#    ✓ Check healthchecks: docker-compose ps
#    ✓ View health details: docker inspect <container>
#    ✓ May indicate: Out of memory, resource constraints
#
# ❌ PROBLEM: Producer/Risk Engine can't connect to IBM MQ
#    ✓ Verify: ibm-mq service is running (docker-compose ps)
#    ✓ Test: docker-compose exec risk-engine nc -zv ibm-mq 1414
#    ✓ Check logs: docker-compose logs ibm-mq
#
# ❌ PROBLEM: Alert Service can't connect to PostgreSQL
#    ✓ Test: docker-compose exec alert-service psql -h postgres -U riskmonitor -d risk_monitoring_db
#    ✓ Check: Postgres schema is initialized (docker-compose logs postgres)
#    ✓ Verify: postgres_data volume isn't corrupted
#
# ============================================================================
# DEPLOYMENT CHECKLISTS
# ============================================================================
#
# LOCAL DEVELOPMENT:
#   ✓ docker-compose up -d
#   ✓ docker-compose logs -f (verify all services healthy)
#   ✓ curl http://localhost:8080/api/actuator/health (check producer)
#   ✓ curl http://localhost:8082/api/actuator/health (check alert service)
#
# DOCKER REGISTRY (for CI/CD):
#   ✓ docker-compose build               (build all images locally)
#   ✓ docker tag risk-monitoring/producer-service:latest myregistry.azurecr.io/producer:v1
#   ✓ docker push myregistry.azurecr.io/producer:v1
#   ✓ Update docker-compose.yml image references
#   ✓ docker-compose up -d (pull from registry)
#
# KUBERNETES MIGRATION:
#   ✓ Use tools: kompose convert docker-compose.yml (auto-generate K8s manifests)
#   ✓ Split into separate services (docker-compose up -> K8s deployments)
#   ✓ Add ConfigMaps for non-sensitive config
#   ✓ Use Secrets for passwords (not .env)
#   ✓ Set resource limits/requests
#   ✓ Configure ingress for external access
#
# ============================================================================
