apiVersion: apps/v1
kind: Deployment
metadata:
  name: alert-service
  namespace: risk-monitoring
  labels:
    app: alert-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alert-service
  template:
    metadata:
      labels:
        app: alert-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: alert-service
        image: alert-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8083
        env:
        # Spring config location - points to mounted ConfigMap
        - name: SPRING_CONFIG_LOCATION
          value: "file:/config/"
        # From ConfigMap (non-sensitive config)
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:mysql://mysql:3306/risk_monitoring?allowPublicKeyRetrieval=true&useSSL=false"
        # MQ Configuration
        - name: MQ_HOST
          value: "ibm-mq"
        - name: MQ_PORT
          value: "1414"
        - name: MQ_CHANNEL
          value: "DEV.APP.SVRCONN"
        - name: LOG_LEVEL
          value: "INFO"
        # From Secret (sensitive credentials)
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: mysql-credentials
              key: username
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-credentials
              key: password
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: jwt-secret
              key: secret
        volumeMounts:
        - name: config-volume
          mountPath: /config/application.yml
          subPath: application.yml
        - name: config-volume
          mountPath: /config/application-production.yml
          subPath: application-production.yml
        # Health check: Is the pod alive?
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8083
          initialDelaySeconds: 90  # Startup takes 45-60 seconds
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
        # Health check: Is the pod ready to receive traffic?
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8083
          initialDelaySeconds: 90  # Wait for full startup
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 2
      volumes:
      - name: config-volume
        configMap:
          name: alert-service-config

---
apiVersion: v1
kind: Service
metadata:
  name: alert-service
  namespace: risk-monitoring
  labels:
    app: alert-service
spec:
  type: ClusterIP
  ports:
  - port: 8083
    targetPort: 8083
    protocol: TCP
  selector:
    app: alert-service
