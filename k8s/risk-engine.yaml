apiVersion: apps/v1
kind: Deployment
metadata:
  name: risk-engine
  labels:
    app: risk-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: risk-engine
  template:
    metadata:
      labels:
        app: risk-engine
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: risk-engine
        image: risk-engine:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8082
        env:
        # From ConfigMap (non-sensitive config)
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:mysql://mysql:3306/risk_monitoring?allowPublicKeyRetrieval=true&useSSL=false"
        - name: IBM_MQ_HOST
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: IBM_MQ_HOST
        - name: IBM_MQ_PORT
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: IBM_MQ_PORT
        - name: IBM_MQ_QUEUE_MANAGER
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: IBM_MQ_QUEUE_MANAGER
        - name: IBM_MQ_CHANNEL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: IBM_MQ_CHANNEL
        - name: IBM_MQ_USER
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: IBM_MQ_USER
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: LOG_LEVEL
        # From Secret (sensitive credentials)
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: DB_USERNAME
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: DB_PASSWORD
        - name: IBM_MQ_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: IBM_MQ_PASSWORD
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: JWT_SECRET
        # Health check: Is the pod alive?
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8082
          initialDelaySeconds: 120  # Extended for JMS initialization
          periodSeconds: 30        # Check every 30 seconds
          timeoutSeconds: 10       # Allow 10 seconds for response
          failureThreshold: 4      # Allow 4 failures before restart
        # Health check: Is the pod ready to receive traffic?
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8082
          initialDelaySeconds: 120  # Extended for MQ connection
          periodSeconds: 15
          timeoutSeconds: 10
          failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: risk-engine
  labels:
    app: risk-engine
spec:
  type: ClusterIP
  ports:
  - port: 8082
    targetPort: 8082
    protocol: TCP
  selector:
    app: risk-engine
