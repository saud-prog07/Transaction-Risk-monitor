apiVersion: apps/v1
kind: Deployment
metadata:
  name: producer-service
  labels:
    app: producer-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: producer-service
  template:
    metadata:
      labels:
        app: producer-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: producer-service
        image: producer-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        env:
        # From ConfigMap (non-sensitive config)
        - name: IBM_MQ_HOST
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: IBM_MQ_HOST
        - name: IBM_MQ_PORT
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: IBM_MQ_PORT
        - name: IBM_MQ_QUEUE_MANAGER
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: IBM_MQ_QUEUE_MANAGER
        - name: IBM_MQ_CHANNEL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: IBM_MQ_CHANNEL
        - name: IBM_MQ_USER
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: IBM_MQ_USER
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: LOG_LEVEL
        # From Secret (sensitive credentials)
        - name: IBM_MQ_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: IBM_MQ_PASSWORD
        # Health check: Is the pod alive?
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 120  # Extended for JMS initialization
          periodSeconds: 30        # Check every 30 seconds
          timeoutSeconds: 10       # Allow 10 seconds for response
          failureThreshold: 4      # Allow 4 failures before restart
        # Health check: Is the pod ready to receive traffic?
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          initialDelaySeconds: 120  # Extended for MQ connection
          periodSeconds: 15
          timeoutSeconds: 10
          failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: producer-service
  labels:
    app: producer-service
spec:
  type: NodePort
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30080
    protocol: TCP
    name: http
  selector:
    app: producer-service
