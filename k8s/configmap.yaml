apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  labels:
    app: risk-monitoring
data:
  # Database Configuration
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_NAME: "risk_monitoring"
  DB_POOL_SIZE: "10"
  
  # RabbitMQ Configuration
  MQ_HOST: "rabbitmq"
  MQ_PORT: "5672"
  MQ_MANAGEMENT_PORT: "15672"
  
  # Application Configuration
  LOG_LEVEL: "INFO"
  ENVIRONMENT: "production"
  
  # Service Ports
  PRODUCER_PORT: "8080"
  RISK_ENGINE_PORT: "8082"
  ALERT_SERVICE_PORT: "8083"
