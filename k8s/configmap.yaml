apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  labels:
    app: risk-monitoring
data:
  # Database Configuration
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_NAME: "risk_monitoring"
  DB_POOL_SIZE: "10"
  
  # IBM MQ Configuration
  IBM_MQ_HOST: "ibm-mq"
  IBM_MQ_PORT: "1414"
  IBM_MQ_QUEUE_MANAGER: "QM1"
  IBM_MQ_CHANNEL: "DEV.APP.SVRCONN"
  IBM_MQ_USER: "app"
  
  # Application Configuration
  LOG_LEVEL: "INFO"
  ENVIRONMENT: "production"
  
  # Service Ports
  PRODUCER_PORT: "8080"
  RISK_ENGINE_PORT: "8082"
  ALERT_SERVICE_PORT: "8083"
