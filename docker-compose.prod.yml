# docker-compose.yml - Production Secure Deployment
# Usage: docker-compose --env-file .env.prod up -d
# Security features:
# - HTTPS/TLS encryption
# - Network isolation (internal backend, public frontend)
# - Secrets management via environment variables
# - Read-only filesystems
# - Non-root users
# - Resource limits
# - Health checks

version: '3.8'

services:
  # ===== Frontend - Public =====
  frontend:
    image: frontend:latest
    container_name: risk-monitoring-frontend
    ports:
      - "3000:3000"
    env_file:
      - .env.prod
    environment:
      - REACT_APP_API_URL=https://api.yourdomain.com
      - REACT_APP_ENVIRONMENT=production
    networks:
      - frontend
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
      - /var/tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # ===== Nginx - SSL/TLS Termination & Reverse Proxy =====
  nginx:
    image: nginx:alpine
    container_name: risk-monitoring-nginx
    ports:
      - "80:80"    # HTTP redirect to HTTPS
      - "443:443"  # HTTPS
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs/fullchain.pem:/etc/nginx/certs/fullchain.pem:ro
      - ./certs/privkey.pem:/etc/nginx/certs/privkey.pem:ro
      - nginx_logs:/var/log/nginx
    networks:
      - frontend  # Access from internet
      - backend   # Access to backend services
    depends_on:
      - alert-service
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    read_only: true
    tmpfs:
      - /var/run/nginx
      - /var/cache/nginx
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

  # ===== Alert Service (Secured Backend) =====
  alert-service:
    image: alert-service:latest
    container_name: risk-monitoring-alert-service
    env_file:
      - .env.prod
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/alert_db
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_JMS_IBM_MQ_CONNNAME=mq:1414
      - SPRING_JMS_IBM_MQ_USER=${MQ_USER}
      - SPRING_JMS_IBM_MQ_PASSWORD=${MQ_PASSWORD}
      - SSL_KEYSTORE_PATH=/opt/keystore.p12
      - SSL_KEYSTORE_PASSWORD=${KEYSTORE_PASSWORD}
    volumes:
      - ./keystore.p12:/opt/keystore.p12:ro
      - alert_service_logs:/var/log/alert-service
    networks:
      - backend  # Internal network only
    depends_on:
      postgres:
        condition: service_healthy
      mq:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "-k", "https://localhost:8443/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
      - NET_RAW
    sysctls:
      - net.ipv4.ip_unprivileged_port_start=0
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G
    expose:
      - "8443"  # Don't publish to host, only accessible via nginx

  # ===== Producer Service =====
  producer-service:
    image: producer-service:latest
    container_name: risk-monitoring-producer
    env_file:
      - .env.prod
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_JMS_IBM_MQ_CONNNAME=mq:1414
      - SPRING_JMS_IBM_MQ_USER=${MQ_USER}
      - SPRING_JMS_IBM_MQ_PASSWORD=${MQ_PASSWORD}
    networks:
      - backend
    depends_on:
      mq:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # ===== Risk Engine =====
  risk-engine:
    image: risk-engine:latest
    container_name: risk-monitoring-risk-engine
    env_file:
      - .env.prod
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/risk_db
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_JMS_IBM_MQ_CONNNAME=mq:1414
      - SPRING_JMS_IBM_MQ_USER=${MQ_USER}
      - SPRING_JMS_IBM_MQ_PASSWORD=${MQ_PASSWORD}
      - ALERT_SERVICE_BASE_URL=https://alert-service:8443
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      mq:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '1.0'
          memory: 512M

  # ===== PostgreSQL Database (Internal Only) =====
  postgres:
    image: postgres:15-alpine
    container_name: risk-monitoring-db
    environment:
      - POSTGRES_DB=alert_db
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_INITDB_ARGS=-c shared_buffers=256MB -c max_connections=100
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - backend  # Internal only
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '1.0'
          memory: 512M

  # ===== IBM MQ Message Queue (Internal Only) =====
  mq:
    image: icr.io/ibm-messaging/mq:9.3
    container_name: risk-monitoring-mq
    environment:
      - LICENSE=accept
      - MQ_QMGR_NAME=${MQ_QMGR:QM1}
      - MQ_APP_USER=${MQ_USER}
      - MQ_APP_PASSWORD=${MQ_PASSWORD}
      - MQ_ADMIN_PASSWORD=${MQ_ADMIN_PASSWORD}
    volumes:
      - mq_data:/var/mqm
    networks:
      - backend  # Internal only
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "chkqmgr", "-m", "${MQ_QMGR:QM1}"]
      interval: 30s
      timeout: 10s
      retries: 3
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - IPC_LOCK
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # ===== Redis Cache (Internal Only) =====
  redis:
    image: redis:7-alpine
    container_name: risk-monitoring-redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - backend  # Internal only
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 256M
        reservations:
          cpus: '0.5'
          memory: 128M

# ===== Networks =====
networks:
  frontend:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1450
  
  backend:
    driver: bridge
    internal: true  # NOT accessible from outside
    driver_opts:
      com.docker.network.driver.mtu: 1450

# ===== Volumes =====
volumes:
  postgres_data:
    driver: local
  mq_data:
    driver: local
  redis_data:
    driver: local
  alert_service_logs:
    driver: local
  nginx_logs:
    driver: local
