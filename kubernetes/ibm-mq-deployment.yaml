apiVersion: v1
kind: ConfigMap
metadata:
  name: mq-config
  namespace: risk-monitoring
data:
  mq-config.mqsc: |
    DEFINE QLOCAL(DEV.QUEUE.1) REPLACE
    DEFINE QLOCAL(DEV.QUEUE.2) REPLACE
    DEFINE QLOCAL(DEV.QUEUE.3) REPLACE
    DEFINE QLOCAL(SYSTEM.DEAD.LETTER.QUEUE)
    ALTER QMGR MAXINST(100) MAXPROC(100)
    DEFINE CHANNEL(DEV.APP.SVRCONN) CHLTYPE(SVRCONN) REPLACE
    SET CHLAUTH(DEV.APP.SVRCONN) TYPE(BLOCKUSER) USERLIST('nobody') ACTION(REMOVE) AGROUP(' ')

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ibm-mq
  namespace: risk-monitoring
  labels:
    app: ibm-mq
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ibm-mq
  template:
    metadata:
      labels:
        app: ibm-mq
    spec:
      containers:
      - name: ibm-mq
        image: icr.io/ibm-messaging/mq:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 1414
          name: mq-listener
        - containerPort: 9443
          name: management
        env:
        - name: LICENSE
          value: "accept"
        - name: MQ_QMGR_NAME
          value: "QM1"
        - name: MQ_APP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mq-credentials
              key: app-password
        - name: MQ_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mq-credentials
              key: admin-password
        - name: MQ_DEV
          value: "false"
        resources:
          limits:
            memory: 2Gi
            cpu: 2
          requests:
            memory: 1Gi
            cpu: 1
        volumeMounts:
        - name: mq-data
          mountPath: /mnt/mqm
        - name: mq-config
          mountPath: /etc/mqm/install-mqm
        livenessProbe:
          tcpSocket:
            port: 1414
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 5
        readinessProbe:
          tcpSocket:
            port: 1414
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
      volumes:
      - name: mq-data
        emptyDir: {}
      - name: mq-config
        configMap:
          name: mq-config

---
apiVersion: v1
kind: Service
metadata:
  name: ibm-mq
  namespace: risk-monitoring
  labels:
    app: ibm-mq
spec:
  type: ClusterIP
  ports:
  - port: 1414
    targetPort: 1414
    protocol: TCP
    name: mq-listener
  - port: 9443
    targetPort: 9443
    protocol: TCP
    name: management
  selector:
    app: ibm-mq
