name: Deploy to Kubernetes

on:
  workflow_run:
    workflows: ["CI/CD Pipeline"]
    types:
      - completed
    branches:
      - main

env:
  REGISTRY: docker.io
  K8S_NAMESPACE: risk-monitoring

jobs:
  deploy-kubernetes:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: production-kubernetes
      url: https://github.com/${{ github.repository }}/deployments

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Configure kubectl context
        run: |
          # For local testing, you can use:
          # kubectl config use-context minikube
          
          # For cloud deployment (Azure AKS example):
          # For AWS EKS: aws eks update-kubeconfig --region us-east-1 --name my-cluster
          # For GKE: gcloud container clusters get-credentials my-cluster --zone us-central1-a
          
          echo "Configure your Kubernetes cluster credentials here"
          echo "This workflow assumes kubectl is already configured"

      - name: Create namespace
        run: |
          kubectl create namespace ${{ env.K8S_NAMESPACE }} || true

      - name: Update image tags in manifests
        run: |
          # Replace the image tags with the current commit SHA
          sed -i "s|docker.io/${{ secrets.DOCKER_USERNAME }}/producer-service:latest|docker.io/${{ secrets.DOCKER_USERNAME }}/producer-service:${{ github.sha }}|g" kubernetes/*.yaml
          sed -i "s|docker.io/${{ secrets.DOCKER_USERNAME }}/risk-engine:latest|docker.io/${{ secrets.DOCKER_USERNAME }}/risk-engine:${{ github.sha }}|g" kubernetes/*.yaml
          sed -i "s|docker.io/${{ secrets.DOCKER_USERNAME }}/alert-service:latest|docker.io/${{ secrets.DOCKER_USERNAME }}/alert-service:${{ github.sha }}|g" kubernetes/*.yaml

      - name: Deploy secrets and config
        run: |
          kubectl apply -f kubernetes/secrets-config.yaml
          echo "✓ Secrets and config deployed"

      - name: Deploy dependencies (RabbitMQ, PostgreSQL)
        run: |
          kubectl apply -f kubernetes/dependencies.yaml
          echo "✓ Dependencies deployed"
          echo "Waiting for dependencies to be ready..."
          kubectl wait --for=condition=ready pod -l app=rabbitmq -n ${{ env.K8S_NAMESPACE }} --timeout=300s || true
          kubectl wait --for=condition=ready pod -l app=postgres -n ${{ env.K8S_NAMESPACE }} --timeout=300s || true

      - name: Deploy Producer Service
        run: |
          kubectl apply -f kubernetes/producer-service-deployment.yaml
          echo "✓ Producer Service deployed"
          kubectl rollout status deployment/producer-service -n ${{ env.K8S_NAMESPACE }} --timeout=300s

      - name: Deploy Risk Engine
        run: |
          kubectl apply -f kubernetes/risk-engine-deployment.yaml
          echo "✓ Risk Engine deployed"
          kubectl rollout status deployment/risk-engine -n ${{ env.K8S_NAMESPACE }} --timeout=300s

      - name: Deploy Alert Service
        run: |
          kubectl apply -f kubernetes/alert-service-deployment.yaml
          echo "✓ Alert Service deployed"
          kubectl rollout status deployment/alert-service -n ${{ env.K8S_NAMESPACE }} --timeout=300s

      - name: Get deployment status
        run: |
          echo "## Kubernetes Deployment Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployments" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          kubectl get deployments -n ${{ env.K8S_NAMESPACE }} >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Services" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          kubectl get services -n ${{ env.K8S_NAMESPACE }} >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pods" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          kubectl get pods -n ${{ env.K8S_NAMESPACE }} >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Create GitHub Deployment
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.ref,
              environment: 'production-kubernetes',
              description: 'Deployed to Kubernetes cluster',
              auto_merge: false,
              required_contexts: []
            });

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              description: 'Kubernetes deployment successful',
              environment_url: 'https://github.com/${{ github.repository }}/deployments'
            });

            core.notice('✅ Deployment successful!');
            core.notice('Deployed services:');
            core.notice('- Producer Service: localhost:8080');
            core.notice('- Risk Engine: localhost:8082');
            core.notice('- Alert Service (LoadBalancer): localhost');
