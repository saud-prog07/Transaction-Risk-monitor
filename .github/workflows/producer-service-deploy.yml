name: Build & Deploy Producer Service

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ✅ Build JAR (MANDATORY)
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build producer-service
        run: mvn clean package -DskipTests

      # ✅ Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ✅ Build & Push image (Dockerfile in backend/producer-service/)
      - name: Build and push Docker image
        run: |
          docker build -t ddddddddff/producer-service:${{ github.sha }} backend/producer-service
          docker push ddddddddff/producer-service:${{ github.sha }}

      # ✅ Install kubectl
      - name: Install kubectl
        uses: azure/setup-kubectl@v3

      # ✅ Deploy to Kubernetes
      - name: Deploy to Kubernetes
        run: |
          echo "${{ secrets.KUBECONFIG }}" > kubeconfig

          kubectl --kubeconfig=kubeconfig set image deployment/producer-service \
            producer-service=ddddddddff/producer-service:${{ github.sha }} \
            -n risk-monitoring

          kubectl --kubeconfig=kubeconfig rollout status deployment/producer-service -n risk-monitoring
