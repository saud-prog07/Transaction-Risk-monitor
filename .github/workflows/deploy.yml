name: Deploy to Registry

on:
  workflow_run:
    workflows: ["CI/CD Pipeline"]
    types:
      - completed
    branches:
      - main

env:
  REGISTRY: docker.io

jobs:
  deploy:
    name: Deploy Images
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and push Producer Service
        uses: docker/build-push-action@v4
        with:
          context: .
          file: backend/producer-service/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/producer-service:latest
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/producer-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Risk Engine
        uses: docker/build-push-action@v4
        with:
          context: .
          file: backend/risk-engine/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/risk-engine:latest
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/risk-engine:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Alert Service
        uses: docker/build-push-action@v4
        with:
          context: .
          file: backend/alert-service/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/alert-service:latest
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/alert-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deployment Summary
        run: |
          echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Docker Images Pushed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Producer Service**: \`docker.io/${{ secrets.DOCKER_USERNAME }}/producer-service:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Risk Engine**: \`docker.io/${{ secrets.DOCKER_USERNAME }}/risk-engine:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Alert Service**: \`docker.io/${{ secrets.DOCKER_USERNAME }}/alert-service:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
